name: generate animation

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 */24 * * *" 
  
  # Allows you to run the action manually at any time
  workflow_dispatch:
  
  # Run on every push to the main branch
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Generates a snake game from a github user's contributions graph
      - name: generate github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Mohamed-Ebrahim-lotfy
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      # Push the content of <build_dir> to a branch
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
